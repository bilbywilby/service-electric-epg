# This workflow lints, type-checks, and tests the project on push/PR.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        # Same tool and config the local pre-commit hook uses (via the
        # Termux-native binary on-device; here via the real PyPI wheel,
        # since ubuntu-latest has no aarch64-linux-android constraint).
        # Running the identical linter in CI and locally means a clean
        # pre-commit run always predicts a clean CI run.
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Type-check with mypy
        run: mypy scripts/

      - name: Test with pytest
        run: pytest -q
